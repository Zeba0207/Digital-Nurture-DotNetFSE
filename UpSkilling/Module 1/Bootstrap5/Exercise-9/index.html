<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Exercise 9</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">
        Exercise 9.1 - Bootstrap Buttons
    </h2>

    <div class="mb-4">

        <button class="btn btn-primary m-1">Primary</button>
        <button class="btn btn-secondary m-1">Secondary</button>
        <button class="btn btn-success m-1">Success</button>
        <button class="btn btn-danger m-1">Danger</button>
        <button class="btn btn-warning m-1">Warning</button>
        <button class="btn btn-info m-1">Info</button>
        <button class="btn btn-light m-1">Light</button>
        <button class="btn btn-dark m-1">Dark</button>

    </div>

    <div class="mb-5">

        <button class="btn btn-outline-primary m-1">Outline Primary</button>
        <button class="btn btn-outline-success m-1">Outline Success</button>
        <button class="btn btn-outline-danger m-1">Outline Danger</button>
        <button class="btn btn-outline-warning m-1">Outline Warning</button>

    </div>

    <hr>

    <h2 class="text-center my-4">
        Exercise 9.2 - Button Groups & Toggle Buttons
    </h2>

    <div class="btn-group mb-4">

        <button class="btn btn-primary">Home</button>
        <button class="btn btn-primary">About</button>
        <button class="btn btn-primary">Contact</button>

    </div>

    <br><br>

    <input type="checkbox" class="btn-check" id="btncheck">

    <label class="btn btn-success" for="btncheck">
        Toggle Button
    </label>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
