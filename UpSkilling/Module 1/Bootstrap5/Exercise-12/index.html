<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Exercise 12</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-5">
        Exercise 12.1 - Spacing Utilities
    </h2>

    <div class="bg-primary text-white m-3 p-2 rounded">
        Margin: m-3 | Padding: p-2
    </div>

    <div class="bg-success text-white mt-4 py-5 rounded text-center">
        Margin Top: mt-4 | Padding Y: py-5
    </div>

    <hr class="my-5">

    <h2 class="text-center mb-5">
        Exercise 12.2 - Pricing Section
    </h2>

    <div class="row">

        <div class="col-md-4 mb-4">

            <div class="card text-center p-4">

                <h3>Basic</h3>

                <h2 class="text-primary">$9</h2>

                <p>1 User</p>
                <p>5 GB Storage</p>

                <button class="btn btn-primary mt-3">
                    Buy Now
                </button>

            </div>

        </div>

        <div class="col-md-4 mb-4">

            <div class="card text-center p-4">

                <h3>Standard</h3>

                <h2 class="text-success">$19</h2>

                <p>5 Users</p>
                <p>50 GB Storage</p>

                <button class="btn btn-success mt-3">
                    Buy Now
                </button>

            </div>

        </div>

        <div class="col-md-4 mb-4">

            <div class="card text-center p-4">

                <h3>Premium</h3>

                <h2 class="text-danger">$49</h2>

                <p>Unlimited Users</p>
                <p>200 GB Storage</p>

                <button class="btn btn-danger mt-3">
                    Buy Now
                </button>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
