<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Exercise 15</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-5">
        Exercise 15.1 - Borders & Rounded Corners
    </h2>

    <div class="text-center">

        <img src="https://via.placeholder.com/180"
             class="border border-primary border-3 rounded-circle"
             alt="Profile">

    </div>

    <div class="border border-success border-3 rounded p-4 mt-4">

        <h4>Bootstrap Border Utilities</h4>

        <p>
            This box demonstrates Bootstrap border utilities with a green border and rounded corners.
        </p>

    </div>

    <hr class="my-5">

    <h2 class="text-center mb-5">
        Exercise 15.2 - Shadow & Rounded Pill
    </h2>

    <div class="card shadow-lg p-4">

        <h3>Premium Card</h3>

        <p>
            This card uses a large Bootstrap shadow.
        </p>

        <button class="btn btn-primary rounded-pill">
            Subscribe
        </button>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
