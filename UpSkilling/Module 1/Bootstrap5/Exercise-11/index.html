<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Exercise 11</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">
        Exercise 11.1 - Profile Card
    </h2>

    <div class="card mx-auto" style="width: 22rem;">

        <img src="https://via.placeholder.com/350x200"
             class="card-img-top"
             alt="Profile Image">

        <div class="card-body">

            <h5 class="card-title">
                John Doe
            </h5>

            <p class="card-text">
                Web Developer passionate about creating responsive and user-friendly websites.
            </p>

            <a href="#" class="btn btn-primary">
                View Profile
            </a>

        </div>

    </div>

    <hr class="my-5">

    <h2 class="text-center mb-4">
        Exercise 11.2 - Media Object Layout
    </h2>

    <div class="d-flex align-items-start border rounded p-3">

        <img src="https://via.placeholder.com/120"
             class="me-3 rounded"
             alt="Media Image">

        <div>

            <h5>Media Object Title</h5>

            <p>
                This layout places an image on the left and text content on the right using Bootstrap Flexbox utilities.
            </p>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
