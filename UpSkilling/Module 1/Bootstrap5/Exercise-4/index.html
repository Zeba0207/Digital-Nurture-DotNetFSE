<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Exercise 4</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">Exercise 4.1 - Sidebar Layout</h2>

    <div class="row">

        <div class="col-md-3">
            <div class="sidebar">
                Sidebar
            </div>
        </div>

        <div class="col-md-9">
            <div class="content">
                Main Content Area
            </div>
        </div>

    </div>

    <hr class="my-5">

    <h2 class="text-center mb-4">Exercise 4.2 - Four Equal Columns</h2>

    <div class="row text-center">

        <div class="col-sm-3">
            <div class="box bg-primary text-white">1</div>
        </div>

        <div class="col-sm-3">
            <div class="box bg-success text-white">2</div>
        </div>

        <div class="col-sm-3">
            <div class="box bg-warning text-dark">3</div>
        </div>

        <div class="col-sm-3">
            <div class="box bg-danger text-white">4</div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
