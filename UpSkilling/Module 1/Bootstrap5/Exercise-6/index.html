<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">
        Exercise 6.1 - Responsive Flexbox Navbar
    </h2>

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-center navbar-box">

        <h3 class="text-primary">My Website</h3>

        <div>

            <a href="#" class="btn btn-outline-primary m-1">Home</a>

            <a href="#" class="btn btn-outline-success m-1">About</a>

            <a href="#" class="btn btn-outline-danger m-1">Contact</a>

        </div>

    </div>

    <hr class="my-5">

    <h2 class="text-center mb-4">
        Exercise 6.2 - Flexbox Card Layout
    </h2>

    <div class="card p-3">

        <div class="d-flex justify-content-between align-items-center">

            <div>

                <h4>Bootstrap Card</h4>

                <p class="mb-0">
                    This card uses Flexbox utilities.
                </p>

            </div>

            <button class="btn btn-primary">
                Read More
            </button>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
