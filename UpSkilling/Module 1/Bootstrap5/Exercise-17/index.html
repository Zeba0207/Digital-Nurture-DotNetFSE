<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Exercise 17</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-5">
        Exercise 17.1 - Buttons with Icons
    </h2>

    <div class="text-center">

        <button class="btn btn-primary m-2">
            <i class="bi bi-download"></i> Download
        </button>

        <button class="btn btn-success m-2">
            <i class="bi bi-check-circle"></i> Submit
        </button>

        <button class="btn btn-danger m-2">
            <i class="bi bi-trash"></i> Delete
        </button>

    </div>

    <hr class="my-5">

    <h2 class="text-center mb-4">
        Exercise 17.2 - Social Media Icons
    </h2>

    <div class="text-center">

        <a href="#" class="btn btn-outline-primary m-2">
            <i class="bi bi-facebook"></i> Facebook
        </a>

        <a href="#" class="btn btn-outline-info m-2">
            <i class="bi bi-twitter-x"></i> Twitter
        </a>

        <a href="#" class="btn btn-outline-danger m-2">
            <i class="bi bi-instagram"></i> Instagram
        </a>

        <a href="#" class="btn btn-outline-dark m-2">
            <i class="bi bi-github"></i> GitHub
        </a>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
