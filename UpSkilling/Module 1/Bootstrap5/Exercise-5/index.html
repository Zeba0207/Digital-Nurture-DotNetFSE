<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Exercise 5</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">
        Exercise 5.1 - Alignment
    </h2>

    <div class="row justify-content-center align-items-center alignment-box">

        <div class="col-4">
            <div class="box bg-primary text-white">
                Box 1
            </div>
        </div>

        <div class="col-4">
            <div class="box bg-success text-white">
                Box 2
            </div>
        </div>

    </div>

    <hr class="my-5">

    <h2 class="text-center mb-4">
        Exercise 5.2 - Reordering Columns
    </h2>

    <div class="row">

        <div class="col-md-6 order-md-2">
            <div class="box bg-warning">
                First Column in HTML<br>
                Second on Desktop
            </div>
        </div>

        <div class="col-md-6 order-md-1">
            <div class="box bg-danger text-white">
                Second Column in HTML<br>
                First on Desktop
            </div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
