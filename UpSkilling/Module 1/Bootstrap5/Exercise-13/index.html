<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Exercise 13</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-5">
        Exercise 13.1 - Dashboard Colors
    </h2>

    <div class="row g-4">

        <div class="col-md-3">
            <div class="card bg-primary text-white text-center p-4">
                <h4>Users</h4>
                <h2>120</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-success text-white text-center p-4">
                <h4>Sales</h4>
                <h2>350</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-warning text-dark text-center p-4">
                <h4>Orders</h4>
                <h2>89</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-danger text-white text-center p-4">
                <h4>Alerts</h4>
                <h2>7</h2>
            </div>
        </div>

    </div>

    <hr class="my-5">

    <h2 class="text-center mb-4">
        Exercise 13.2 - Gradient Background
    </h2>

    <div class="bg-dark bg-gradient text-white text-center p-5 rounded">

        <h2>Bootstrap Gradient Section</h2>

        <p>
            This section uses bg-dark, bg-gradient, and white text.
        </p>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
